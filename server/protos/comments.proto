syntax = "proto3";

package comments.v1;

option go_package = "github.com/bd878/gallery/server/api";

service Comments {
	rpc SendComment(SendCommentRequest) returns (SendCommentResponse);
	rpc UpdateComment(UpdateCommentRequest) returns (UpdateCommentResponse);
	rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
	rpc DeleteMessageComments(DeleteMessageCommentsRequest) returns (DeleteMessageCommentsResponse);
	rpc ReadComment(ReadCommentRequest) returns (ReadCommentResponse);
	rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
}

message CommentSnapshotItem {
	int64     id = 1;
	int64     message_id = 2;
	int64     user_id = 3;
	string    text = 4;
	string    created_at = 5;
	string    updated_at = 6;
	optional bytes metadata = 7;
}

message Comment {
	int64     id = 1;
	int64     message_id = 2;
	int64     user_id = 3;
	string    text = 4;
	string    created_at = 5;
	string    updated_at = 6;
	optional bytes metadata = 7;
}

message CommentsList {
	repeated Comment comments = 1;
	bool     is_last_page = 2;
	bool     is_first_page = 3;
	int32    total = 4;
	int32    count = 5;
}

message SendCommentRequest {
	int64     id = 1;
	int64     message_id = 2;
	int64     user_id = 3;
	string    text = 4;
	optional bytes metadata = 5;
}

message SendCommentResponse {
}

message ListCommentsRequest {
	int32     limit = 1;
	int32     offset = 2;
	bool      asc = 3;
	optional int64 message_id = 4;
	optional int64 user_id = 5;
}

message ListCommentsResponse {
	repeated Comment comments = 1;
	bool     is_last_page = 2;
	bool     is_first_page = 3;
	int32    total = 4;
	int32    count = 5;
}

message UpdateCommentRequest {
	int64      id = 1;
	int64      user_id = 2;
	optional string text = 3;
	optional bytes  metadata = 4;
}

message UpdateCommentResponse {
}

message DeleteCommentRequest {
	int64      id = 1;
	int64      user_id = 2;
}

message DeleteCommentResponse {
}

message ReadCommentRequest {
	int64      id = 1;
	int64      user_id = 2;
}

message ReadCommentResponse {
	Comment comment = 1;
}

message DeleteMessageCommentsRequest {
	int64      message_id = 1;
}

message DeleteMessageCommentsResponse {
}