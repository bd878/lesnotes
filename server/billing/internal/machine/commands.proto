syntax = "proto3";

option go_package = "github.com/bd878/gallery/server/billing/internal/machine";

message AppendInvoiceCommand {
	string  id = 1;
	int64   user_id = 2;
	string  status = 3;
	int64   total = 4;
	string  created_at = 5;
	string  updated_at = 6;
	bytes   cart = 7;
	optional bytes metadata = 8;
}

message AppendPaymentCommand {
	int64   id = 1;
	int64   user_id = 2;
	string  invoice_id = 3;
	string  status = 4;
	string  currency = 5;
	int64   total = 6;
	string  created_at = 7;
	string  updated_at = 8;
	optional bytes metadata = 9;
}

message ProceedPaymentCommand {
	int64   id = 1;
	int64   user_id = 2;
	string  updated_at = 3;
}

message PayInvoiceCommand {
	string  id = 1;
	int64   user_id = 2;
	string  updated_at = 3;
}

message CancelPaymentCommand {
	int64   id = 1;
	int64   user_id = 2;
	string  updated_at = 3;
}

message CancelInvoiceCommand {
	string  id = 1;
	int64   user_id = 2;
	string  updated_at = 3;
}

message RefundPaymentCommand {
	int64   id = 1;
	int64   user_id = 2;
	string  updated_at = 3;
}