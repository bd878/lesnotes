syntax = "proto3";

option go_package = "github.com/bd878/gallery/server/users/internal/machine";

message AppendCommand {
	int64   id  = 1;
	string  login = 2;
	string  hashed_password = 3;
	string  created_at = 4;
	string  updated_at = 5;
	optional bytes   metadata = 6;
}

message UpdateCommand {
	int64   id = 1;
	optional string  login = 2;
	string  updated_at = 3;
	optional bytes metadata = 4;
}

message DeleteCommand {
	int64   id = 1;
}

message MakePremiumCommand {
	string invoice_id = 1;
	int64 id = 2;
	string expires_at = 3;
	string created_at = 4;
}