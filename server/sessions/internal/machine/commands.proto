syntax = "proto3";

option go_package = "github.com/bd878/gallery/server/sessions/internal/machine";

message AppendCommand {
	int64    user_id = 1;
	string   token = 2;
	string   expires_at = 3;
	string   created_at = 4;
}

message DeleteCommand {
	string   token = 1;
}

message DeleteUserSessionsCommand {
	int64    user_id = 1;
}
