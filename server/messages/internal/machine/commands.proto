syntax = "proto3";

option go_package = "github.com/bd878/gallery/server/messages/internal/machine";

message AppendCommand {
	int64   id = 1;
	int64   user_id = 2;
	repeated int64   file_ids = 3;
	string  text = 4;
	string  name = 5;
	bool    private = 6;
	string  title = 7;
	string  created_at = 8;
	string  updated_at = 9;
}

message UpdateCommand {
	int64   id = 1;
	int64   user_id = 2;
	repeated int64   file_ids = 3;
	optional string  text = 4;
	optional string  name = 5;
	optional string  title = 6;
	string  updated_at = 7;
}

message DeleteCommand {
	int64   id = 1;
	int64   user_id = 2;
}

message DeleteUserMessagesCommand {
	int64   user_id = 1;
}

message PublishCommand {
	repeated int64   ids = 1;
	int64   user_id = 2;
	string  updated_at = 3;
}

message PrivateCommand {
	repeated int64 ids = 1;
	int64   user_id = 2;
	string  updated_at = 3;
}

message DeleteFileCommand {
	int64  id         = 1;
	int64  user_id    = 3;
}

message AppendTranslationCommand {
	int64  message_id = 1;
	string lang = 2;
	string title = 3;
	string text = 4;
	string created_at = 5;
	string updated_at = 6;
}

message UpdateTranslationCommand {
	int64  message_id = 1;
	string lang = 2;
	optional string title = 3;
	optional string text = 4;
	string updated_at = 5;
}

message DeleteTranslationCommand {
	int64  message_id = 1;
	string lang = 2;
}

message AppendCommentCommand {
	int64     id = 1;
	int64     message_id = 2;
	int64     user_id = 3;
	string    text = 4;
	string    created_at = 5;
	string    updated_at = 6;
	optional bytes metadata = 7;
}

message UpdateCommentCommand {
	int64      id = 1;
	int64      user_id = 2;
	optional string text = 3;
	optional bytes  metadata = 4;
	string     updated_at = 5;
}

message DeleteCommentCommand {
	int64      id = 1;
	int64      user_id = 2;
}

message DeleteMessageCommentsCommand {
	int64      message_id = 1;
}