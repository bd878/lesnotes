- name: Save config on services
  hosts:
    - gallery-stage-3
    - gallery-stage-4

  tasks:
  - name: Write grpc config
    ansible.builtin.template:
      src: templates/{{ item }}.grpc.json.j2
      dest: /srv/gallery/stage/{{ item }}/config/grpc.json
    notify:
      - Restart {{ item }}
    loop:
      - messages
      - users
      - threads
      - billing
      - search
      - sessions

  - name: Write envs
    tags:
      - envs
    ansible.builtin.template:
      src: templates/{{ item }}.grpc.conf.j2
      dest: /srv/gallery/stage/{{ item }}/config/grpc.conf
    notify:
      - Restart {{ item }}
    loop:
      - messages
      - users
      - threads
      - billing
      - search
      - sessions

  - name: Flush pending handlers
    ansible.builtin.meta: flush_handlers

  - name: Let cluster restart
    ansible.builtin.pause:
      seconds: 30

  - name: Write http config
    ansible.builtin.template:
      src: templates/{{ item }}.http.json.j2
      dest: /srv/gallery/stage/{{ item }}/config/http.json
    notify:
      - Restart {{ item }} http
    loop:
      - messages
      - users
      - billing
      - search
      - threads

  handlers:
    - name: Restart handlers
      ansible.builtin.import_tasks: restart-handlers.yml
