- name: Disable stale package repositories from machines
  hosts: hosts
  become: yes
  vars_files:
    - /home/snd/ansible_quickstart/vaulted-vars.yaml

  tasks:
  - name: pgdg13
    ansible.builtin.ini_file:
      path: /etc/yum.repos.d/pgdg-redhat-all.repo
      section: pgdg13
      option: enabled
      value: "0"
      mode: "0644"

  - name: pgdg14
    ansible.builtin.ini_file:
      path: /etc/yum.repos.d/pgdg-redhat-all.repo
      section: pgdg14
      option: enabled
      value: "0"
      mode: "0644"

  - name: pgdg15
    ansible.builtin.ini_file:
      path: /etc/yum.repos.d/pgdg-redhat-all.repo
      section: pgdg15
      option: enabled
      value: "0"
      mode: "0644"

  - name: pgdg16
    ansible.builtin.ini_file:
      path: /etc/yum.repos.d/pgdg-redhat-all.repo
      section: pgdg16
      option: enabled
      value: "0"
      mode: "0644"
