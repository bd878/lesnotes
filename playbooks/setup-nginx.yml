---
- name: Setup nginx server
  become: yes
  hosts: sonnenschein

  tasks:
  - name: Print vars
    tags: debug
    debug:
      msg:
        ansible_host: "{{ hostvars[inventory_hostname]['ansible_host'] }}"

  - name: Print only machine vars
    tags: debug
    debug:
      msg:
        play_hostname: "{{ hostvars[inventory_hostname]['inventory_hostname'] }}"
        play_hosts: "{{ hostvars[inventory_hostname]['inventory_hostname'] }}"
        machine_hostname: "{{ hostvars['machine']['inventory_hostname'] }}"
    when: inventory_hostname != 'machine'

  - name: Download nginx
    ansible.builtin.apt:  
      name: nginx
      state: present
      allow_downgrade: yes
    tags: skip
    when: inventory_hostname == 'machine'

  - name: Setup config
    vars:
      public_addr: hostvars[inventory_hostname]['ansible_host']
    ansible.builtin.template:
      src: templates/nginx.conf.j2
      dest: /etc/nginx/conf.d/gallery.conf
    tags: skip
    when: inventory_hostname == 'machine'

  - name: Reload nginx
    ansible.builtin.systemd_service:
      name: nginx
      state: reloaded
      daemon_reload: true
    tags: skip
    when: inventory_hostname == 'machine'
