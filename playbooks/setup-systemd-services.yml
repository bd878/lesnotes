---
- name: Save systemd services
  hosts: hosts
  become: Yes

  tasks:
  - name: Write grpc services
    ansible.builtin.template:
      src: templates/grpc.service.j2
      dest: /etc/systemd/system/gallery-{{ item }}.service
    notify: Reload systemd daemon
    loop:
      - messages
      - users
      - threads
      - billing
      - search
      - sessions

  - name: Write http services
    ansible.builtin.template:
      src: templates/http.service.j2
      dest: /etc/systemd/system/gallery-{{ item }}-http.service
    notify: Reload systemd daemon
    loop:
      - messages
      - users
      - threads
      - billing
      - search

  handlers:
  - name: Reload systemd daemon
    ansible.builtin.systemd_service:
      daemon_reload: true
